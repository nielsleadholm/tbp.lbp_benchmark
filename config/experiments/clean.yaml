# Experiment config: dataset, rng, and dataset perturbations (no LBP params here).
# The LBP texture extraction + matching parameters come from a separate --lbp-config.

data:
  query_images_folder: LBP_Test_Images/WellDefinedTextures_10Rotations_128
  target_images_folder: LBP_Test_Images/WellDefinedTextures_128

rng:
  seed: 42

query_image_processing:
  preprocessing:
    gaussian_blur: null
    gaussian_noise: null
    illumination: null
    contrast: null

  cropping:
    width: null
    height: null
    random_crop: false

  resampling:
    width: null
    height: null
    method: "lanczos"

target_image_processing:
  preprocessing:
    gaussian_blur: null
    gaussian_noise: null
    illumination: null
    contrast: null

  cropping:
    width: null
    height: null
    random_crop: false

  resampling:
    width: null
    height: null
    method: "lanczos"

output:
  save_csv: true
  save_pdf: false
  visualize: false
