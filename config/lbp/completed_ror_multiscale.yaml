# LBP config: texture extraction + matching parameters only.
# Pair this with one or more experiment configs (see config/experiments/).

texture_extraction:
  multi_scale:
    - completed_local_binary_pattern:
        P: 8
        R: 1.0
        method: "ror"
    - completed_local_binary_pattern:
        P: 8
        R: 2.0
        method: "ror"
    - completed_local_binary_pattern:
        P: 8
        R: 3.0
        method: "ror"
    - completed_local_binary_pattern:
        P: 16
        R: 4.0
        method: "ror"
    - completed_local_binary_pattern:
        P: 8
        R: 5.0
        method: "ror"

matching:
  metric: "chi2"
  tolerance: 1
  top: 1
