data:
  query_images_folder: LBP_Test_Images/WellDefinedTextures_10Rotations_128
  target_images_folder: LBP_Test_Images/WellDefinedTextures_128

rng:
  seed: 42

texture_extraction:
  multi_scale:
    - local_ternary_pattern:
        P: 8
        R: 1.0
        method: "ror"
        threshold: 5
    - local_ternary_pattern:
        P: 8
        R: 5.0
        method: "ror"
        threshold: 5
    - local_ternary_pattern:
        P: 8
        R: 10.0
        method: "ror"
        threshold: 5
    - local_ternary_pattern:
        P: 8
        R: 30.0
        method: "ror"
        threshold: 5
    - local_ternary_pattern:
        P: 8
        R: 40.0
        method: "ror"
        threshold: 5
    - local_ternary_pattern:
        P: 8
        R: 50.0
        method: "ror"
        threshold: 5


matching:
  metric: "chi2"
  tolerance: 1
  top: 1

query_image_processing:
  preprocessing:
    gaussian_blur: 0.0
    gaussian_noise: 0.0
    illumination: 1.5
    contrast: null
    
  cropping:
    width: null
    height: null
    random_crop: false

  resampling:
    width: null
    height: null
    method: "lanczos"

target_image_processing:
  preprocessing:
    gaussian_blur: null
    gaussian_noise: null
    illumination: null
    contrast: null
    
  cropping:
    width: null
    height: null
    random_crop: false

  resampling:
    width: null
    height: null
    method: "lanczos"

output:
  save_csv: false
  save_pdf: false
  visualize: true